        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');:root{--bg:#06060d;--surface:rgba(20,20,30,0.5);--border:rgba(200,210,240,0.08);--purple:#9d4edd;--cyan:#00f5d4;--pink:#ff006e;--discord:#5865F2;--accent:#c8d2f0;--text:#f8f9fa;--muted:#8b949e;--font:'Space Grotesk',sans-serif;--code:'Fira Code',monospace}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:none}#cursor{position:fixed;width:12px;height:12px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .2s,height .2s,background .2s}#cursor-ring{position:fixed;width:40px;height:40px;border:1px solid rgba(255,255,255,0.2);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .35s,height .35s,border-color .35s}body:has(a:hover) #cursor{width:8px;height:8px;background:var(--discord)}body:has(a:hover) #cursor-ring{width:60px;height:60px;border-color:rgba(88,101,242,0.4)}#aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}.blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.15;animation:blob-float 15s ease-in-out infinite alternate}.b1{width:70vw;height:70vw;background:radial-gradient(circle,var(--discord),transparent 60%);top:-20vh;left:-10vw}.b2{width:50vw;height:50vw;background:radial-gradient(circle,var(--purple),transparent 60%);top:40vh;right:-10vw;animation-delay:-5s}.b3{width:40vw;height:40vw;background:radial-gradient(circle,var(--cyan),transparent 60%);bottom:-10vh;left:20vw;animation-delay:-10s}@keyframes blob-float{0%{transform:translate(0,0) scale(1.1)}50%{transform:translate(5%,-5%) scale(0.9)}100%{transform:translate(-5%,5%) scale(1.05)}}#noise{position:fixed;inset:0;z-index:1;opacity:0.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none}.card{position:relative;z-index:10;background:var(--surface);border:1px solid var(--border);border-radius:32px;padding:48px 40px 40px;backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);box-shadow:inset 0 1px 1px rgba(255,255,255,0.03),0 32px 80px rgba(0,0,0,0.5);width:90%;max-width:400px;text-align:center;animation:card-in 0.8s cubic-bezier(0.16,1,0.3,1) both}@keyframes card-in{from{opacity:0;transform:translateY(32px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}.avatar-wrap{position:relative;width:100px;height:100px;margin:0 auto 28px}.avatar-ring{position:absolute;inset:-5px;border-radius:50%;background:linear-gradient(135deg,var(--discord) 0%,var(--purple) 50%,var(--pink) 100%);background-size:400%;animation:ring-spin 4s linear infinite;z-index:0}@keyframes ring-spin{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}.avatar-inner{position:relative;z-index:2;width:100%;height:100%;border-radius:50%;padding:3px;background:var(--bg)}.avatar-img{width:100%;height:100%;border-radius:50%;object-fit:cover}.badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--code);font-size:0.7rem;color:rgba(88,101,242,0.9);padding:6px 14px;border-radius:100px;background:rgba(88,101,242,0.08);border:1px solid rgba(88,101,242,0.2);margin-bottom:16px;letter-spacing:0.5px}.badge-dot{width:7px;height:7px;border-radius:50%;background:var(--discord);animation:pulse 2s ease-in-out infinite;flex-shrink:0}@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}h1{font-size:2rem;font-weight:700;letter-spacing:-1.5px;line-height:1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.sub{font-size:0.9rem;color:var(--muted);line-height:1.6;font-weight:300;margin-bottom:32px}.progress-wrap{width:100%;height:4px;background:rgba(255,255,255,0.05);border-radius:10px;overflow:hidden;margin-bottom:32px}.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--discord),var(--purple));box-shadow:0 0 12px rgba(88,101,242,0.4);border-radius:10px;animation:fill 3s cubic-bezier(0.4,0,0.2,1) forwards}@keyframes fill{from{width:0%}to{width:100%}}.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;border-radius:18px;background:var(--discord);color:#fff;text-decoration:none;font-family:var(--font);font-size:0.95rem;font-weight:600;letter-spacing:-0.3px;border:1px solid rgba(255,255,255,0.1);transition:all 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:0 4px 20px rgba(88,101,242,0.3);position:relative;overflow:hidden}.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);opacity:0;transition:opacity 0.3s}.btn:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(88,101,242,0.5)}.btn:hover::before{opacity:1}.btn svg{width:20px;height:20px;fill:currentColor;flex-shrink:0}.footer-label{font-family:var(--code);font-size:0.65rem;color:rgba(255,255,255,0.15);letter-spacing:2px;text-transform:uppercase;margin-top:24px}@media(max-width:768px){body{cursor:auto}#cursor,#cursor-ring{display:none}.card{padding:32px 24px;border-radius:24px}h1{font-size:1.6rem}}
